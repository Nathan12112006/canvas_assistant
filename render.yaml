services:
  - type: web
    name: canvas-assistant-api
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    disks:
      - name: canvas-assistant-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATA_DIR
        value: /var/data
